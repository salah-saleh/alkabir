server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # kamal-proxy healthcheck target (see config/deploy.yml proxy.healthcheck.path)
  location = /up {
    return 200;
    add_header Content-Type text/plain;
  }

  location / {
    try_files $uri $uri/ =404;
  }

  # Long cache for fingerprint-free static assets is skipped here on purpose --
  # this is a single-page site with no build/versioning step, so a short cache
  # avoids serving a stale index.html/assets after a deploy.
  location ~* \.(?:png|jpg|jpeg|css|js)$ {
    expires 1h;
    add_header Cache-Control "public";
  }
}
